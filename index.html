<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS+JS Clock</title>
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:200i,300,400&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="div quote_container">
        <div class="quote_area">
          <span class="quote">
            "If you look at what you have in life, you'll always have more. If
            you look at what you don't have in life you'll never have enough."
          </span>
        </div>
        <div class="author">Oprah Winfrey</div>
      </div>

      <div class="div clock">
        <div class="date">
          <div class="date_display"></div>
        </div>
        <div class="clock_face">
          <div class="hand hour_hand"></div>
          <div class="hand min_hand"></div>
          <div class="hand sec_hand"></div>
        </div>
        <div class="digital_clock">
          <div class="time_display"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
